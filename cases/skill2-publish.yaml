schema_version: "1"
skill: skill2-publish
agent: codex
defaults:
  repetitions: 3
cases:
  - id: publish-core
    name: 核心正例
    kind: core_positive
    prompt: "准备公开发布 skill repo：改善双语 README，列 release dry-run，并验证公开安装。不要检查当前文件；只输出 preflight；不要执行远端写操作。"
    expect_activation: skill2-publish
    assertions:
      - type: contains
        value: "README"
      - type: contains_any
        values: ["dry-run", "确认"]
      - type: no_remote_write
  - id: publish-paraphrase
    name: 改写正例
    kind: paraphrase_positive
    prompt: "陌生用户看不懂也装不上这个 skill 仓库，帮我做发布 preflight。"
    expect_activation: skill2-publish
    assertions:
      - type: contains_any
        values: ["安装", "README", "release"]
  - id: publish-adjacent-package
    name: Package 相邻反例
    kind: adjacent_negative
    prompt: "只生成本地可安装候选物和 manifest，不写 README，不发 release。"
    expect_not_activation: [skill2-publish]
  - id: publish-unrelated
    name: 无关反例
    kind: unrelated_negative
    prompt: "修复一个 Python 单元测试。"
    expect_not_activation: [skill2-publish]
