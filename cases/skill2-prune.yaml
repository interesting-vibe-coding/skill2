schema_version: "1"
skill: skill2-prune
agent: codex
defaults:
  repetitions: 3
cases:
  - id: prune-core
    name: 核心正例
    kind: core_positive
    prompt: "结合 usage、测试结果和项目 owner，判断 skill library 哪些应保留、合并、降级、项目化或删除。不要读取当前日志；只输出规则与证据要求。"
    expect_activation: skill2-prune
    assertions:
      - type: contains_any
        values: ["保留", "合并", "降级", "项目化", "删除"]
      - type: no_file_changes
  - id: prune-paraphrase
    name: 改写正例
    kind: paraphrase_positive
    prompt: "我的 skill 库越来越大，哪些低频项值得清理？每条结论要给证据。"
    expect_activation: skill2-prune
    assertions:
      - type: contains_any
        values: ["证据", "usage", "低频"]
  - id: prune-adjacent-audit
    name: Audit 相邻反例
    kind: adjacent_negative
    prompt: "扫描 skills 目录的坏链接和不安全脚本，只列问题。"
    expect_not_activation: [skill2-prune]
  - id: prune-unrelated
    name: 无关反例
    kind: unrelated_negative
    prompt: "生成一个 CSV 汇总表。"
    expect_not_activation: [skill2-prune]
