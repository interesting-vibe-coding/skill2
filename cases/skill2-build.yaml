schema_version: "1"
skill: skill2-build
agent: codex
defaults:
  repetitions: 3
cases:
  - id: build-core
    name: 核心正例
    kind: core_positive
    prompt: "帮我设计一个管理 API 文档的 agent skill。先判断 scope，再给 SKILL.md 和测试场景；不要改文件。"
    expect_activation: skill2-build
    assertions:
      - type: contains
        value: "SKILL.md"
  - id: build-paraphrase
    name: 改写正例
    kind: paraphrase_positive
    prompt: "这段重复 agent instructions 应该做成顶层 skill 还是 reference？给出最小结构。"
    expect_activation: skill2-build
    assertions:
      - type: contains_any
        values: ["reference", "skill"]
  - id: build-adjacent-test
    name: Test 相邻反例
    kind: adjacent_negative
    prompt: "现有 skill 会不会误触发？请做隔离评测。"
    expect_not_activation: [skill2-build]
  - id: build-unrelated
    name: 无关反例
    kind: unrelated_negative
    prompt: "解释 Python context manager。"
    expect_not_activation: [skill2-build]
