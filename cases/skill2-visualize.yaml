schema_version: "1"
skill: skill2-visualize
agent: codex
defaults:
  repetitions: 3
cases:
  - id: visualize-core
    name: 核心正例
    kind: core_positive
    prompt: "可视化 skill library 的库存、调用频率、最近调用、零调用和测试状态。只输出本地 HTML 报告方法；不要读取当前日志或改文件。"
    expect_activation: skill2-visualize
    assertions:
      - type: contains
        value: "skill2 visualize"
      - type: contains_any
        values: ["session log", "session-log", "日志"]
      - type: no_file_changes
  - id: visualize-paraphrase
    name: 改写正例
    kind: paraphrase_positive
    prompt: "我想看 skills 库哪些最近被调用、哪些从未见过使用记录，并把测试结果放进一个本地页面。"
    expect_activation: skill2-visualize
    assertions:
      - type: contains
        value: "skill2 visualize"
  - id: visualize-adjacent-prune
    name: Prune 相邻反例
    kind: adjacent_negative
    prompt: "根据半年 usage 决定 skill library 哪些应保留、合并、降级或删除。"
    expect_not_activation: [skill2-visualize]
  - id: visualize-unrelated
    name: 无关反例
    kind: unrelated_negative
    prompt: "解释 Python dataclass。"
    expect_not_activation: [skill2-visualize]
